name: Docs Structure CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Docs and release docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Docs structure check
        run: node scripts/docs-structure-check.mjs

      - name: Release doc contract
        run: node --test tests/lib/release-doc-contract.test.mjs
